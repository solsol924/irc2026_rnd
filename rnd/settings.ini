# ─────────────────────────────────────────────────────
#  Line Tracker 설정 파일  (2차 다항식 피팅 버전)
#  로지텍 1080p 카메라 / 640×480 해상도 기준 튜닝값
# ─────────────────────────────────────────────────────

[camera]
index          = 0
width          = 640
height         = 480
fps            = 30
flip_vertical  = false

[detection]
# ── 흰색 HSV 범위
#    어두운 환경 → white_lower_v 를 낮추세요 (예: 150)
#    조명이 밝은 환경 → 170~190
white_lower_h = 0
white_lower_s = 0
white_lower_v = 170
white_upper_h = 180
white_upper_s = 55
white_upper_v = 255

# ── 직사각형 마커 면적 필터
min_blob_area = 400
max_blob_area = 25000

# ── 직사각형 비율 필터 (긴변/짧은변)
#    마커가 정사각형에 가까우면 min 을 낮추세요 (예: 1.2)
min_aspect_ratio = 1.4
max_aspect_ratio = 8.0

# ── ROI 비율 (전체 프레임 기준 0.0~1.0)
roi_top_ratio    = 0.10
roi_bottom_ratio = 1.00
roi_left_ratio   = 0.25
roi_right_ratio  = 0.82

# ── 세로 밴드 분할 수 (근거리/중거리/원거리 등)
n_bands = 5

[curve]
# ── |2차항 계수 a| 이 값보다 작으면 직선으로 판별
#    640×480 픽셀 좌표 기준: 보통 2e-5 ~ 5e-5
straight_curvature_thresh = 3e-5

# ── 피팅 신뢰도 최솟값 (0.0~1.0)
min_confidence = 0.30

# ── 피팅에 필요한 최소 점 수
min_points_for_poly = 3

[output]
show_window          = true
save_video           =
print_every_n_frames = 5